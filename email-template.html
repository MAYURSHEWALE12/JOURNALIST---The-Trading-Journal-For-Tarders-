<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f1f1f1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f1f1;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="400" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;">
          
          <!-- Header -->
          <tr>
            <td style="padding:40px 32px 24px;text-align:center;border-bottom:1px solid #e5e5e5;">
              <div style="width:40px;height:40px;background:#000000;border-radius:8px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;">J</div>
              <h2 style="margin:0;font-size:18px;font-weight:700;color:#000;letter-spacing:-0.3px;">Confirm your email</h2>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 32px 24px;">
              <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#555;">
                Click the button below to confirm this email address and finish signing up for <strong style="color:#000;">Journalist</strong>.
              </p>
              <table cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td align="center" style="background:#000;border-radius:8px;padding:0;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:12px 32px;font-size:13px;font-weight:600;color:#fff;background:#000;border-radius:8px;text-decoration:none;letter-spacing:0.3px;">
                      Confirm email address
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-size:12px;line-height:1.5;color:#999;">
                If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;background:#f9f9f9;border-top:1px solid #e5e5e5;">
              <p style="margin:0;font-size:11px;color:#aaa;text-align:center;font-family:'Courier New',monospace;">
                JOURNALIST — TRADING JOURNAL
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
